project:
  type: website
  output-dir: ../qpapers-published

website:
  title: "Home"
  description: "Implementation-focused research in RL and Quantum Computing"
  favicon: images/favicon-32x32.png
  navbar:
    left:
      - text: "ACON"
        href: ./acon.qmd
        
      - text: "DIRAC Technical Paper"
        href: ./dirac_technical_paper.qmd
        
      - text: "DIRAC White Paper"
        href: ./dirac_white_paper.qmd
      
    right:
      - text: "QbitAI.in"
        href: https://qubitai.in
        target: _blank
       
format:
  html:
    theme: journal
    toc: true
    code-fold: false
  pdf:
    documentclass: article
    fontsize: 11pt
    geometry: margin=1in
    include-in-header:
      - text: |
          \usepackage{amsmath,amsfonts,amssymb}
          \usepackage{graphicx}