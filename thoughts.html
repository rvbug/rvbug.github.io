<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/thoughts.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/thoughts.ico">  
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/thoughts.ico">
    <title>The Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #ffffff;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'EB Garamond', serif;
        }

        /* --- THE SWIFT INTRO --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        /* SVG Stroke Animation */
        .kuro-path {
            fill: none;
            stroke: #000;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            /* Uniform drawing speed across strokes */
            animation: drawKuro 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Staggering the strokes to mimic hand-writing */
        .p1 { animation-delay: 0.1s; }
        .p2 { animation-delay: 0.4s; }
        .p3 { animation-delay: 0.8s; }
        .p4 { animation-delay: 1.3s; }

        @keyframes drawKuro {
            to { stroke-dashoffset: 0; }
        }

        /* --- THE LIQUID STAGE --- */
        #archive-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: flex;
            justify-content: center;
        }

        #list-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8vh;
            padding: 45vh 0;
            will-change: transform;
            backface-visibility: hidden;
        }

        .name-node {
            font-size: 2.2rem;
            color: #d1d1d1;
            text-decoration: none;
            transition: color 0.6s ease, transform 0.6s ease;
            user-select: none;
            white-space: nowrap;
        }

        .is-returning #intro-screen { display: none !important; }
        .is-returning #archive-stage { opacity: 1 !important; }
    </style>
</head>
<body>

<div id="intro-screen">
    <svg width="120" height="120" viewBox="0 0 100 100">
        <path class="kuro-path p1" d="M50 8Q50 15 50 22" stroke-width="4"/>
        <path class="kuro-path p2" d="M15 32Q50 25 85 32" stroke-width="4.5"/>
        <path class="kuro-path p3" d="M48 32 C42 45, 30 55, 35 60 C40 65, 55 50, 65 45 C75 40, 30 90, 25 88 C20 86, 60 85, 75 82" stroke-width="4"/>
        <path class="kuro-path p4" d="M62 65Q70 75 75 92" stroke-width="4"/>
    </svg>
</div>

<div id="archive-stage">
    <div id="list-container">
        <!-- <a href="#" class="name-node">Steve Harris</a>
        <a href="#" class="name-node">Chris Nolan</a>
        <a href="stevejobs.html" class="name-node">Steve Jobs</a> -->
        <a href="kuro.html" class="name-node">Kuro</a>
        <!-- <a href="" class="name-node">Infinity</a>  -->
        <!-- <a href="#" class="name-node">Jony Ive</a>
        <a href="#" class="name-node">Nicolaus Copernicus</a> -->
    </div>
</div>

<script>
    const container = document.getElementById('list-container');
    const nodes = document.querySelectorAll('.name-node');
    const intro = document.getElementById('intro-screen');
    const stage = document.getElementById('archive-stage');

    let currentY = 0;
    let targetY = 0;
    const ease = 0.04;

    window.addEventListener('mousemove', (e) => {
        const winH = window.innerHeight;
        const listH = container.offsetHeight;
        const percentage = e.clientY / winH;
        targetY = (listH - winH) * percentage;
    });

    function update() {
        currentY += (targetY - currentY) * ease;
        container.style.transform = `translate3d(0, -${currentY}px, 0)`;

        const screenCenter = window.innerHeight / 2;
        nodes.forEach(node => {
            const rect = node.getBoundingClientRect();
            const nodeCenter = rect.top + (rect.height / 2);
            const dist = Math.abs(screenCenter - nodeCenter);
            
            if (dist < 300) {
                const progress = 1 - (dist / 300);
                const val = Math.floor(209 * (1 - progress));
                node.style.color = `rgb(${val}, ${val}, ${val})`;
                node.style.transform = `scale(${1 + (progress * 0.08)})`;
            } else {
                node.style.color = '#d1d1d1';
                node.style.transform = `scale(1)`;
            }
        });
        requestAnimationFrame(update);
    }

    window.addEventListener('DOMContentLoaded', () => {
        targetY = (container.offsetHeight - window.innerHeight) / 2;
        currentY = targetY;
        update();

        if (sessionStorage.getItem('archive_liquid')) {
            document.body.classList.add('is-returning');
        } else {
            // Wait for the SVG drawing to finish (approx 2.5s) before fading intro
            setTimeout(() => {
                intro.style.opacity = '0';
                stage.style.opacity = '1';
                sessionStorage.setItem('archive_liquid', 'true');
                setTimeout(() => intro.style.display = 'none', 800);
            }, 2800); 
        }
    });
</script>
</body>
</html>
