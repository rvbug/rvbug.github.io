
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write — QuBiTAi</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/AudioWide-White.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/AudioWide-White.ico">
    <!-- <link rel="stylesheet" href="css/write.css"> -->

<style>
    :root {
    --bg: #000;
    --text-dim: #86868b;
    --blue-accent: #2997ff;
    --red-accent: #ff3b30;
}

body, html {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; /* Full screen immersive */
}

.back-btn {
    position: fixed;
    top: 30px;
    left: 30px;
    z-index: 100;
    text-decoration: none;
    color: rgba(255, 255, 255, 0.4);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.3s ease;
}

.back-btn:hover {
    color: #fff;
}

.back-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    transition: transform 0.3s ease;
}

.back-btn:hover svg {
    transform: translateX(-5px);
}



.write-container {
    display: flex;
    height: 100vh;
    width: 100vw;
}

.write-pane {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px;
    text-decoration: none;
    transition: flex 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s ease;
    overflow: hidden;
}

.write-pane:hover {
    flex: 1.5;
}

/* Background Gradients */
.pane-docs { background: linear-gradient(180deg, #050505 0%, #001d3d 100%); border-right: 1px solid #111; }
.pane-blog { background: linear-gradient(180deg, #050505 0%, #2b0a0a 100%); }

.pane-content {
    max-width: 400px;
    z-index: 2;
}

.pane-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
}

.pane-docs .pane-label { color: var(--blue-accent); }
.pane-blog .pane-label { color: var(--red-accent); }

/* .pane-title {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
    color: #fff;
} */

.pane-title {
    /* Increased the 'preferred' value from 6vw to 8vw */
    font-size: clamp(40px, 8vw, 90px); 
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
    color: #fff;
}

.pane-desc {
    font-size: 18px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 30px;
}

.pane-link {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 40px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-weight: 500;
    font-size: 15px;
    color: #fff;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.pane-docs:hover .pane-link {
    background: var(--blue-accent);
    border-color: var(--blue-accent);
}

.pane-blog:hover .pane-link {
    background: var(--red-accent);
    border-color: var(--red-accent);
}

/* Center Watermark */
.write-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 180px;
    font-weight: 900;
    color: rgba(255,255,255,0.03);
    pointer-events: none;
    z-index: 1;
    letter-spacing: -0.05em;
}

@media (max-width: 768px) {

    body, html {
        overflow-y: auto; /* Allow scrolling on mobile/tablets */
        overflow-x: hidden; /* Prevent horizontal bar */
    }

    .write-container { 
        flex-direction: column; 
        height: auto; 
        min-height: 100vh;
    }

   .write-pane {
    display: flex;
    flex-direction: column;
    justify-content: center; /* Ensures vertical centering on all aspect ratios */
    align-items: center;
    min-height: 100vh; /* Ensures the pane fills the screen on Surface Pro browsers */
}

    .back-btn {
        top: 20px;
        left: 50%;
        transform: translateX(-50%); /* Centered on mobile */
        background: rgba(0,0,0,0.5); /* Slight backing for readability */
        padding: 8px 16px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
    }


    .write-pane:hover {
        flex: 1; /* Disable expansion on mobile for better stability */
    }
    .pane-title {
        font-size: 32px;
    }

    .write-watermark {
        font-size: 15vw; /* Scales perfectly with screen width */
        opacity: 0.02;
    }

    .pane-content {
        max-width: 90%; 
    }
}


/* Tablet Optimization (iPad) */
@media (min-width: 769px) and (max-width: 1024px) {
    .write-container {
        height: 100vh; /* Force one-page fit */
        overflow: hidden;
    }
    
    .pane-title {
        font-size: 42px; /* Shrink title slightly to fit */
    }

    .pane-content {
        max-width: 300px; /* Prevent text from spanning too wide */
    }
}

/* High-Resolution Tablet Optimization (iPad Pro / Surface Pro) */
@media (min-width: 1024px) and (max-height: 1366px) {
    .pane-title {
        font-size: 80px; /* Larger, more authoritative title */
        margin-bottom: 30px;
    }

    .pane-desc {
        font-size: 22px; /* Increased readability for high-res screens */
        max-width: 450px;
        margin-bottom: 40px;
    }

    .pane-label {
        font-size: 14px;
        letter-spacing: 0.5em; /* More air between letters */
    }

    .pane-link {
        padding: 16px 32px;
        font-size: 18px;
    }
}


/* When the container is hovered, dim both panes... */
.write-container:hover .write-pane {
    filter: brightness(0.4) grayscale(0.2);
}

/* ...but keep the currently hovered pane bright and sharp */
.write-container .write-pane:hover {
    filter: brightness(1) grayscale(0);
}

.pane-content {
    transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
}

.write-pane:hover .pane-content {
    transform: scale(1.05); /* Slight "zoom" toward the user */
}


</style>


</head>
<body>
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Home
    </a>

    <div class="write-watermark">WRITE</div>

    <div class="write-container">
        
        <a href="https://qubitai.in/book/" class="write-pane pane-docs">
            <div class="pane-content">
                <span class="pane-label">Technical Architecture</span>
                <h2 class="pane-title">The Book.</h2>
                <p class="pane-desc">Design decisions, system blueprints, and the philosophy behind my open-source infrastructure.</p>
                <!-- <span class="pane-link">Explore Documentation →</span> -->
                <span class="pane-link">Explore Documentation</span>
            </div>
        </a>

        <a href="https://qubitai.in/qscribe-docs/" class="write-pane pane-blog">
            <div class="pane-content">
                <span class="pane-label">Editorial Journal</span>
                <h2 class="pane-title">Scribe.</h2>
                <p class="pane-desc">Observations on the intersection of human cognitive friction and machine intelligence.</p>
                <!-- <span class="pane-link">Read the Blog →</span> -->
                <span class="pane-link">Read the Blog</span>
            </div>
        </a>

    </div>

</body>
</html>
